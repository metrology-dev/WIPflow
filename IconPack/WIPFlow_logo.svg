<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#082a63"/>
      <stop offset="55%" stop-color="#0b3f8e"/>
      <stop offset="100%" stop-color="#06214a"/>
    </linearGradient>

    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="cyanBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42cfff"/>
      <stop offset="100%" stop-color="#72ecff"/>
    </linearGradient>

    <linearGradient id="yellowBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffbf2f"/>
      <stop offset="100%" stop-color="#ffe066"/>
    </linearGradient>

    <linearGradient id="purpleBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9c5cff"/>
      <stop offset="100%" stop-color="#c892ff"/>
    </linearGradient>

    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-opacity="0.35"/>
    </filter>

    <filter id="innerGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffffff" flood-opacity="0.15"/>
    </filter>

    <filter id="barShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.35"/>
    </filter>
  </defs>

  <ellipse cx="512" cy="960" rx="360" ry="36" fill="#000000" opacity="0.22"/>

  <g filter="url(#shadow)">
    <rect x="40" y="40" width="944" height="944" rx="120"
          fill="url(#bg)"
          stroke="#2a5ca8"
          stroke-width="6"/>

    <rect x="48" y="48" width="928" height="928" rx="112"
          fill="none"
          stroke="#7cb8ff"
          stroke-opacity="0.15"
          stroke-width="2"/>

    <path d="M40,160
             Q512,40 984,140
             L984,40
             L40,40 Z"
          fill="url(#gloss)"/>
  </g>

  <!-- Grid -->
  <g opacity="0.10" stroke="#9fc8ff" stroke-width="2">
    <line x1="180" y1="320" x2="180" y2="860"/>
    <line x1="240" y1="320" x2="240" y2="860"/>
    <line x1="300" y1="320" x2="300" y2="860"/>
    <line x1="360" y1="320" x2="360" y2="860"/>
    <line x1="420" y1="320" x2="420" y2="860"/>
    <line x1="480" y1="320" x2="480" y2="860"/>
    <line x1="540" y1="320" x2="540" y2="860"/>
    <line x1="600" y1="320" x2="600" y2="860"/>
    <line x1="660" y1="320" x2="660" y2="860"/>
    <line x1="720" y1="320" x2="720" y2="860"/>
    <line x1="780" y1="320" x2="780" y2="860"/>

    <line x1="150" y1="420" x2="860" y2="420"/>
    <line x1="150" y1="500" x2="860" y2="500"/>
    <line x1="150" y1="580" x2="860" y2="580"/>
    <line x1="150" y1="660" x2="860" y2="660"/>
    <line x1="150" y1="740" x2="860" y2="740"/>
  </g>

  <text x="170" y="330"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="250"
        font-weight="800"
        fill="#ffffff"
        filter="url(#innerGlow)">WIP</text>

  <text x="185" y="500"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="110"
        font-weight="700"
        fill="#67deff">Flow</text>

  <g filter="url(#barShadow)">
    <rect x="470" y="500" width="220" height="54" rx="14" fill="url(#cyanBar)"/>
    <rect x="220" y="570" width="280" height="54" rx="14" fill="url(#cyanBar)"/>
    <rect x="520" y="640" width="260" height="54" rx="14" fill="url(#yellowBar)"/>
    <rect x="720" y="735" width="180" height="54" rx="14" fill="url(#purpleBar)"/>
  </g>

  <line x1="770" y1="385" x2="770" y2="820"
        stroke="#f2f2f2"
        stroke-width="18"
        stroke-linecap="round"/>

  <circle cx="770" cy="380" r="30"
          fill="#f7f7f7"
          stroke="#d0d0d0"
          stroke-width="4"/>
</svg>
